app = "memket-agent"
primary_region = "iad"

[build]

[env]
  PORT = "8000"
  MEMKET_AGENT_NAME = "memket-agent"
  MEMKET_AGENT_ADDRESS = "0x0000000000000000000000000000000000000000"
  MEMKET_PUBLIC_URL = "https://memket-agent.fly.dev"

[mounts]
  source = "memket_data"
  destination = "/data"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = false

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/health"
